<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koh Phangan Tours</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2a3a;
  color:#fff;
  text-align:center;
}

/* LOGO + TEXT */
.hero-brand{
 display:flex;
 align-items:center;
 justify-content:center;
 gap:12px;
 margin-top:8px;
 transform:translateY(-6px);
}

.hero-brand img{
 width:75px;
 height:75px;
 object-fit:contain;
}

.hero-brand span{
 font-size:32px;
 font-weight:800;
}

/* HERO IMAGE */
.hero-image-wrapper{
 position:relative;
 max-width:900px;
 margin:10px auto;
}

.hero-image{
 width:100%;
 border-radius:20px;
}

/* OVERLAY TEXT */
.hero-overlay-text{
 position:absolute;
 bottom:20px;
 left:20px;
 right:20px;
 background:rgba(0,0,0,0.6);
 padding:14px;
 border-radius:14px;
 font-size:22px;
 font-weight:700;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

/* CARDS */
.card{
 background:#fff;
 color:#000;
 border-radius:16px;
 overflow:hidden;
}

.card-image{
 height:160px;
 background-size:cover;
 background-position:center;
}

.card-content{
 padding:16px;
}

.button-success{
 display:inline-block;
 background:#16c36f;
 color:#fff;
 padding:10px 16px;
 border-radius:10px;
 text-decoration:none;
 margin-top:10px;
}

/* IMAGES */
.img-firsttime{
 background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
}

.img-sealovers{
 background-image:url("https://images.unsplash.com/photo-1544551763-46a013bb70d5");
}

.img-adventure{
 background-image:url("https://cdn.getyourguide.com/image/format=auto,fit=crop,gravity=auto,quality=60,width=375,height=230/tour_img/9f7d36439b6856b0.jpeg");
}

.img-party{
 background-image:url("https://images.unsplash.com/photo-1516450360452-9312f5e86fc7");
}

/* SOCIAL */
.social-floating{
 position:fixed;
 bottom:80px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:10px;
 z-index:9999;
}

.social-btn{
 width:48px;
 height:48px;
 border-radius:50%;
 background:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
}

/* MOBILE FIX */
@media(max-width:768px){
 .social-floating{
   display:flex !important;
   bottom:70px;
 }
}
</style>
</head>

<body>

<div class="hero-brand">
  <img src="Logo.png">
  <span>Koh Phangan Tours</span>
</div>

<div class="hero-image-wrapper">
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" class="hero-image">
  <div class="hero-overlay-text">
    🌴 Best Koh Phangan Tours & Island Experiences
  </div>
</div>

<div class="grid">

<div class="card">
<div class="card-image img-firsttime"></div>
<div class="card-content">
<h2>🎉 First Time</h2>
<a class="button-success" href="#">Explore</a>
</div>
</div>

<div class="card">
<div class="card-image img-sealovers"></div>
<div class="card-content">
<h2>🌊 Sea Lovers</h2>
<a class="button-success" href="#">Explore</a>
</div>
</div>

<div class="card">
<div class="card-image img-adventure"></div>
<div class="card-content">
<h2>🔥 Adventure</h2>
<a class="button-success" href="#">Explore</a>
</div>
</div>

<div class="card">
<div class="card-image img-party"></div>
<div class="card-content">
<h2>🌕 Party</h2>
<a class="button-success" href="https://www.viator.com/searchResults/all?text=full+moon+party+koh+phangan&pid=P00293371&mcid=42383&medium=link&medium_version=selector" target="_blank">Explore</a>
</div>
</div>

</div>

<div class="social-floating">
<div class="social-btn">F</div>
<div class="social-btn">I</div>
<div class="social-btn">T</div>
</div>

</body>
</html>
