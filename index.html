<!DOCTYPE html>
<html>
<head>
  <title>Koh Phangan Tours</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    a.button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #e74c3c;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🌴 Koh Phangan Tours</h1>
<p>Best tours, parties & experiences</p>

<div class="card">
  <h2>🚤 Full Moon Party Boat</h2>
  <p>Party boat + drinks + entry</p>
  <a class="button" href="#">🔥 Book Now</a>
</div>

<div class="card">
  <h2>🐠 Snorkeling Tour</h2>
  <p>Explore beaches & coral reefs</p>
  <a class="button" href="#">Check Availability</a>
</div>

<div class="card">
  <h2>🏝️ Ang Thong Marine Park</h2>
  <p>Kayaking + lagoons + views</p>
  <a class="button" href="#">Reserve Now</a>
</div>

</body>
</html>
