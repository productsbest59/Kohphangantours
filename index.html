<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koh Phangan Tours</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1c2c;
  color:white;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero {
  text-align:center;
  padding:40px 20px;
}

.hero img {
  width:100%;
  max-height:320px;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:20px;
}

h1 {
  font-size:48px;
}

.ad-banner {
  background:linear-gradient(45deg,#ff6a3d,#ff3d68);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

.ad-banner h2 {
  font-size:32px;
}

.card {
  background:white;
  color:black;
  border-radius:20px;
  margin:20px 0;
  overflow:hidden;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content {
  padding:20px;
  text-align:center;
}

.button {
  display:inline-block;
  margin-top:10px;
  padding:12px 20px;
  background:#ff3d68;
  color:white;
  text-decoration:none;
  border-radius:10px;
}

.chat {
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  width:300px;
  border-radius:15px;
  display:none;
  padding:15px;
}

.chat.open {
  display:block;
}

.chat-toggle {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff3d68;
  color:white;
  border:none;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:24px;
}
</style>
</head>

<body>

<div class="container">

<section class="hero">

<!-- התמונה שלך -->
<img src="https://raw.githubusercontent.com/productsbest59/Kohphangantours/main/thai-women.jpg">

<h1>🌴 Koh Phangan Tours</h1>
<p>Best tours & experiences in Thailand</p>

<!-- באנר -->
<div class="ad-banner">
<h2>This Ad Space Could Be Yours</h2>
<p>
Promote your business here and reach travelers looking for the best experiences<br>
For more info Mail to <b>info@kohphangantours.com</b>
</p>
</div>

</section>

<!-- טיולים -->

<div class="card">
<img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329">
<div class="card-content">
<h2>Full Moon Party</h2>
<a class="button" href="https://www.getyourguide.com/surat-thani-province-l897/full-moon-party-koh-phangan-night-tour-t1090131/?cmp=referral_GBNA3BC" target="_blank">Book Now</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1559827260-dc66d52bef19">
<div class="card-content">
<h2>Snorkeling Tour</h2>
<a class="button" href="https://www.getyourguide.com/surat-thani-province-l897/koh-phangan-traditional-boat-trip-with-snorkeling-and-beach-time-t1100237/?cmp=referral_GBNA3BC" target="_blank">Book Now</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
<div class="card-content">
<h2>ATV Jungle</h2>
<a class="button" href="https://www.getyourguide.com/ko-phangan-l5038/atv-jungle-adventure-experience-from-ko-pha-ngan-t516848/?cmp=referral_GBNA3BC" target="_blank">Book Now</a>
</div>
</div>

</div>

<!-- צאט -->
<div id="chat" class="chat">
<form action="https://formspree.io/f/mwvrybyd" method="POST">
<input type="text" name="name" placeholder="Name" required><br><br>
<input type="email" name="email" placeholder="Email" required><br><br>
<textarea name="message" placeholder="Message" required></textarea><br><br>
<button type="submit">Send</button>
</form>
</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<script>
function toggleChat(){
  document.getElementById("chat").classList.toggle("open");
}
</script>

</body>
</html>
